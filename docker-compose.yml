services:
  app:
    build: .
    ports: ["3000:3000"]
    env_file: .env
    depends_on: [db, redis]
    networks: [backend]

  db:
    image: postgres:15-alpine
    volumes: [pgdata:/var/lib/postgresql/data]
    env_file: .env
    networks: [backend]

  redis:
    image: redis:7-alpine
    networks: [backend]

volumes:
  pgdata:

networks:
  backend:
